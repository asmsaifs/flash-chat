<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashChat Widget Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      color: #333;
    }
    h1 { color: #1a1a1a; }
    .info {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      max-width: 600px;
      margin-top: 20px;
    }
    .info code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: white;
      font-size: 0.75em;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>FlashChat Widget Test <span class="badge">local</span></h1>
  <div class="info">
    <p><strong>Widget JS:</strong> <code>http://localhost:3000/widget.js</code></p>
    <p><strong>API:</strong> <code>http://localhost:4000</code></p>
    <p><strong>Channel ID:</strong> <code>7564dbbe-f096-4bee-88e3-bed2b8b04b24</code></p>
    <p>Chat widget loads bottom-right. Make sure widget server (port 3000) and API (port 4000) are running.</p>
  </div>

  <script
    src="http://localhost:3000/widget.js"
    data-channel="7564dbbe-f096-4bee-88e3-bed2b8b04b24"
    data-api="http://localhost:4000"
  ></script>
</body>
</html>
